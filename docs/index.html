<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="乐乐食谱">
<title>贵宾乐乐定制食谱</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f2f2f7;
  --card: #ffffff;
  --text: #1c1c1e;
  --text-secondary: #8e8e93;
  --text-tertiary: #c7c7cc;
  --accent: #007aff;
  --green: #34c759;
  --orange: #ff9500;
  --red: #ff3b30;
  --divider: #e5e5ea;
  --input-bg: #f2f2f7;
  --shadow: 0 2px 8px rgba(0,0,0,0.04);
  --radius: 16px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #000000;
    --card: #1c1c1e;
    --text: #f5f5f7;
    --text-secondary: #98989d;
    --text-tertiary: #48484a;
    --divider: #38383a;
    --input-bg: #2c2c2e;
    --shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 500px;
  margin: 0 auto;
  padding: 0 16px 60px;
}

/* Nav */
.nav {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg);
  padding: 16px 0 4px;
}
.nav h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.nav-sub {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  padding-bottom: 8px;
}
.nav-sub a {
  font-size: 13px;
  color: var(--accent);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 3px;
}
.nav-sub a:active { opacity: 0.5; }

/* Card */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-top: 16px;
  overflow: hidden;
}

/* Section Header */
.section-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 12px 16px;
  font-size: 16px;
  font-weight: 600;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}

/* Days Card */
.days-card {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 18px 16px;
}
.days-label {
  font-size: 16px;
  font-weight: 500;
}
.days-input-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}
.days-input {
  width: 64px;
  padding: 8px 10px;
  border: none;
  border-radius: 10px;
  background: var(--input-bg);
  color: var(--text);
  font-size: 22px;
  font-weight: 700;
  font-family: "SF Pro Rounded", -apple-system, sans-serif;
  text-align: center;
  outline: none;
  -moz-appearance: textfield;
}
.days-input::-webkit-outer-spin-button,
.days-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.days-input:focus { box-shadow: 0 0 0 2px var(--accent); }
.days-unit {
  font-size: 16px;
  color: var(--text-secondary);
}

/* Total Weight */
.total-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 16px 16px 18px;
}
.total-hint {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 10px;
  text-align: center;
  line-height: 1.4;
}
.total-main-label {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.total-input-row {
  display: flex;
  align-items: baseline;
  gap: 4px;
}
.total-input {
  font-size: 40px;
  font-weight: 700;
  font-family: "SF Pro Rounded", -apple-system, sans-serif;
  text-align: center;
  width: 160px;
  border: none;
  background: transparent;
  color: var(--text);
  outline: none;
  -moz-appearance: textfield;
}
.total-input::-webkit-outer-spin-button,
.total-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.total-unit {
  font-size: 20px;
  color: var(--text-secondary);
}
.confirm-btn {
  margin-top: 10px;
  padding: 6px 20px;
  border: none;
  border-radius: 20px;
  background: var(--accent);
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.2s;
}
.confirm-btn:active { opacity: 0.7; }

/* Row */
.row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
}
.row + .row { border-top: 1px solid var(--divider); }
.row-info { flex: 1; min-width: 0; }
.row-name { font-size: 16px; }
.row-note {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 2px;
}
.row-value {
  display: flex;
  align-items: center;
  gap: 3px;
  flex-shrink: 0;
}
.weight-input {
  width: 72px;
  padding: 6px 8px;
  border: none;
  border-radius: 8px;
  background: var(--input-bg);
  color: var(--text);
  font-size: 16px;
  font-family: "SF Mono", ui-monospace, monospace;
  text-align: right;
  outline: none;
  transition: background 0.2s;
  -moz-appearance: textfield;
}
.weight-input::-webkit-outer-spin-button,
.weight-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.weight-input:focus { background: rgba(0,122,255,0.08); }
.row-unit {
  font-size: 14px;
  color: var(--text-secondary);
}
.amount-text {
  font-size: 16px;
  font-family: "SF Mono", ui-monospace, monospace;
}

/* Delta */
.delta {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  font-family: "SF Mono", ui-monospace, monospace;
  flex-shrink: 0;
  white-space: nowrap;
}
.delta.up { color: var(--red); background: rgba(255,59,48,0.1); }
.delta.down { color: var(--green); background: rgba(52,199,89,0.1); }

/* Notes */
.note-item {
  font-size: 14px;
  color: var(--text-secondary);
  padding: 2px 16px;
  line-height: 1.6;
}
.note-item:last-child { padding-bottom: 12px; }

/* Clear */
.clear-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  margin: 16px auto 0;
  padding: 8px 16px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-size: 14px;
  cursor: pointer;
}
.clear-btn:active { opacity: 0.5; }
</style>
</head>
<body>

<div class="container">
  <div class="nav">
    <h1>贵宾乐乐定制食谱</h1>
    <div class="nav-sub">
      <a href="贵宾乐乐定制食谱.xlsx" download>
        <span>📎</span> 查看原始食谱文件
      </a>
    </div>
  </div>

  <!-- Days -->
  <div class="card">
    <div class="days-card">
      <span class="days-label">制作天数</span>
      <div class="days-input-wrap">
        <input type="number" class="days-input" id="daysInput" value="10" inputmode="numeric">
        <span class="days-unit">天</span>
      </div>
    </div>
  </div>

  <!-- Total Weight -->
  <div class="card">
    <div class="total-card">
      <div class="total-hint">建议每日喂食量：<strong>160 克</strong>（可根据实际情况增减）</div>
      <span class="total-main-label">总克数</span>
      <div class="total-input-row">
        <input type="number" class="total-input" id="totalInput" value="0" inputmode="decimal">
        <span class="total-unit">克</span>
      </div>
      <div id="totalDelta"></div>
      <button class="confirm-btn" id="confirmBtn">确认</button>
    </div>
  </div>

  <!-- Ingredients -->
  <div class="card">
    <div class="section-header">
      <span class="dot" style="background:var(--green)"></span>
      食材
    </div>
    <div id="ingredientsList"></div>
  </div>

  <!-- Supplements -->
  <div class="card">
    <div class="section-header">
      <span class="dot" style="background:var(--orange)"></span>
      补剂
    </div>
    <div id="supplementsList"></div>
  </div>

  <!-- Notes -->
  <div class="card">
    <div class="section-header">
      <span class="dot" style="background:var(--red)"></span>
      注意事项
    </div>
    <div id="notesList"></div>
  </div>

  <button class="clear-btn" id="clearBtn">↺ 清除变化标记</button>
</div>

<script>
const DAILY_INTAKE = 160;

const DEFAULT_RECIPE = {
  title: '贵宾乐乐定制食谱',
  dailyIntake: DAILY_INTAKE,
  ingredients: [
    { name: '火鸡胸', percentage: 17, note: '' },
    { name: '牛瘦肉', percentage: 10, note: '草饲' },
    { name: '鸡胗', percentage: 7, note: '打碎' },
    { name: '铁棍山药/红薯', percentage: 9, note: '' },
    { name: '小米饭/小麦意面', percentage: 25.5, note: '熟重 煮软 避免夹生 意面可选螺旋/贝壳形' },
    { name: '芹菜', percentage: 6, note: '焯水 打碎' },
    { name: '青豌豆/胡萝卜', percentage: 5, note: '煮熟 打碎' },
    { name: '冬瓜', percentage: 10, note: '' },
    { name: '羽衣甘蓝/上海青/芥菜/甜菜叶', percentage: 5, note: '焯水 打碎' },
    { name: '苹果/莓果', percentage: 3, note: '' },
    { name: '红枣', percentage: 0.5, note: '打碎' },
    { name: '熟黑芝麻粉', percentage: 0.5, note: '' },
    { name: '小麦胚芽油/亚麻籽油/橄榄油', percentage: 0.4, note: '' },
    { name: 'now柠檬酸钙 calcium citrate', percentage: 0.55, note: '' },
  ],
  supplements: [
    { name: 'L-赖氨酸 L-Lysine', amountPerKg: 1.5, unit: 'g', note: '' },
    { name: 'now铁 iron', amountPerKg: 0.5, unit: '粒', note: '18mg/粒规格' },
    { name: 'now海带粉胶囊', amountPerKg: 1, unit: '粒', note: '325ug/粒规格' },
    { name: '葡萄糖酸锌 Zinc gluconate', amountPerKg: 0.75, unit: '粒', note: '50mg/粒规格' },
    { name: 'now维生素D3滴剂', amountPerKg: 2, unit: '滴', note: '100IU/滴规格' },
    { name: 'now维生素E滴剂', amountPerKg: 10, unit: '滴', note: '10mg/滴规格' },
    { name: 'now b-50 复合vb', amountPerKg: 0.25, unit: '粒', note: '胶囊版' },
    { name: 'Thorne磷脂酰胆碱', amountPerKg: 3, unit: '粒', note: '420mg/粒规格' },
    { name: '牛磺酸 Taurine', amountPerKg: 1, unit: 'g', note: '' },
    { name: '鱼油', amountPerKg: 1, unit: '粒', note: '高浓度 例如whc小红帽或viva' },
    { name: 'solgar螯合铜 chelated copper', amountPerKg: 0.25, unit: '粒', note: '2.5mg/粒规格' },
  ],
  notes: [
    '忌生冷食物；忌刺激性草本如姜黄，肉桂，黑胡椒等；忌乳制品，油腻食物，芝士，花生酱，香蕉，过咸食物；忌一顿吃得过多，建议少食多餐（一日至少三餐）；如有药物遵医嘱。',
  ],
};

// --- State ---

const state = {
  recipe: null,
  days: 10,
  totalWeight: 0,
  prevTotalWeight: null,
};

function deepCloneRecipe(r) {
  return {
    ...r,
    ingredients: r.ingredients.map(i => ({ ...i, currentWeight: 0, prevWeight: null })),
    supplements: r.supplements.map(s => ({ ...s, currentAmount: 0, prevAmount: null })),
    notes: [...r.notes],
  };
}

// --- Calculation ---

function totalPercentage() {
  return state.recipe.ingredients.reduce((s, i) => s + i.percentage, 0);
}

function recalcFromTotal(newTotal, savePrev) {
  const pctSum = totalPercentage();
  if (pctSum <= 0) return;

  if (savePrev) {
    state.prevTotalWeight = state.totalWeight;
    state.recipe.ingredients.forEach(i => { i.prevWeight = i.currentWeight; });
    state.recipe.supplements.forEach(s => { s.prevAmount = s.currentAmount; });
  }

  state.recipe.ingredients.forEach(i => {
    i.currentWeight = newTotal * (i.percentage / pctSum);
  });
  state.recipe.supplements.forEach(s => {
    s.currentAmount = (newTotal / 1000) * s.amountPerKg;
  });

  state.totalWeight = newTotal;
}

function initRecipe() {
  state.recipe = deepCloneRecipe(DEFAULT_RECIPE);
  const total = DAILY_INTAKE * state.days;
  recalcFromTotal(total, false);
}

function setDays(d) {
  if (d <= 0) return;
  state.days = d;
  const newTotal = DAILY_INTAKE * d;
  recalcFromTotal(newTotal, true);
  render();
}

function commitTotalWeight(newTotal) {
  if (newTotal <= 0) return;
  recalcFromTotal(newTotal, true);
  state.days = Math.round((newTotal / DAILY_INTAKE) * 10) / 10;
  render();
}

function updateIngredientWeight(index, newWeight) {
  if (newWeight <= 0 || !state.recipe) return;
  const old = state.recipe.ingredients[index].currentWeight;
  if (old <= 0) return;
  const scale = newWeight / old;

  state.prevTotalWeight = state.totalWeight;

  state.recipe.ingredients.forEach((i, idx) => {
    i.prevWeight = i.currentWeight;
    i.currentWeight = idx === index ? newWeight : i.currentWeight * scale;
  });
  state.recipe.supplements.forEach(s => {
    s.prevAmount = s.currentAmount;
    s.currentAmount *= scale;
  });

  state.totalWeight *= scale;
  state.days = Math.round((state.totalWeight / DAILY_INTAKE) * 10) / 10;
  render();
}

function resetDeltas() {
  if (!state.recipe) return;
  state.prevTotalWeight = null;
  state.recipe.ingredients.forEach(i => { i.prevWeight = null; });
  state.recipe.supplements.forEach(s => { s.prevAmount = null; });
  render();
}

// --- Formatting ---

function fmtWeight(v) {
  if (v >= 10 && Math.abs(v - Math.round(v)) < 0.05) return Math.round(v).toString();
  return v.toFixed(1);
}

function fmtAmount(v) {
  if (v >= 1 && v === Math.round(v)) return Math.round(v).toString();
  return v >= 10 ? v.toFixed(1) : v.toFixed(2);
}

function fmtDays(v) {
  if (v === Math.round(v)) return Math.round(v).toString();
  return v.toFixed(1);
}

function deltaHTML(prev, curr, threshold) {
  if (prev == null) return '';
  const diff = curr - prev;
  if (Math.abs(diff) < (threshold || 0.05)) return '';
  const up = diff > 0;
  const cls = up ? 'up' : 'down';
  const arrow = up ? '↑' : '↓';
  const sign = up ? '+' : '';
  const val = Math.abs(diff) >= 10 ? Math.round(diff) : diff.toFixed(1);
  return `<span class="delta ${cls}">${arrow} ${sign}${val}</span>`;
}

function esc(s) {
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

// --- Render ---

function render() {
  const r = state.recipe;
  if (!r) return;

  document.getElementById('daysInput').value = fmtDays(state.days);
  document.getElementById('totalInput').value = fmtWeight(state.totalWeight);

  const totalDeltaEl = document.getElementById('totalDelta');
  totalDeltaEl.innerHTML = state.prevTotalWeight != null
    ? deltaHTML(state.prevTotalWeight, state.totalWeight) + (deltaHTML(state.prevTotalWeight, state.totalWeight) ? ' 克' : '')
    : '';

  // Ingredients
  document.getElementById('ingredientsList').innerHTML = r.ingredients.map((ing, i) => `
    <div class="row">
      <div class="row-info">
        <div class="row-name">${esc(ing.name)}</div>
        ${ing.note ? `<div class="row-note">${esc(ing.note)}</div>` : ''}
      </div>
      <div class="row-value">
        <input type="number" class="weight-input" inputmode="decimal"
               value="${fmtWeight(ing.currentWeight)}"
               data-index="${i}"
               onfocus="this.select()"
               onblur="commitIngredient(this)"
               onkeydown="if(event.key==='Enter'){this.blur()}">
        <span class="row-unit">克</span>
      </div>
      ${deltaHTML(ing.prevWeight, ing.currentWeight)}
    </div>`).join('');

  // Supplements
  document.getElementById('supplementsList').innerHTML = r.supplements.map(s => `
    <div class="row">
      <div class="row-info">
        <div class="row-name">${esc(s.name)}</div>
        ${s.note ? `<div class="row-note">${esc(s.note)}</div>` : ''}
      </div>
      <div class="row-value">
        <span class="amount-text">${fmtAmount(s.currentAmount)}</span>
        <span class="row-unit">${esc(s.unit)}</span>
      </div>
      ${deltaHTML(s.prevAmount, s.currentAmount, 0.005)}
    </div>`).join('');

  // Notes
  document.getElementById('notesList').innerHTML =
    r.notes.map(n => `<div class="note-item">${esc(n)}</div>`).join('');
}

function commitIngredient(input) {
  const idx = parseInt(input.dataset.index);
  const val = parseFloat(input.value);
  if (!state.recipe || idx >= state.recipe.ingredients.length) return;
  const current = state.recipe.ingredients[idx].currentWeight;
  if (isNaN(val) || val <= 0) {
    input.value = fmtWeight(current);
    return;
  }
  if (Math.abs(val - current) < 0.01) return;
  updateIngredientWeight(idx, val);
}

// --- Events ---

document.getElementById('daysInput').addEventListener('change', function () {
  const d = parseFloat(this.value);
  if (d > 0) setDays(d);
  else this.value = fmtDays(state.days);
});
document.getElementById('daysInput').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') this.blur();
});

document.getElementById('confirmBtn').addEventListener('click', function () {
  const val = parseFloat(document.getElementById('totalInput').value);
  if (val > 0) commitTotalWeight(val);
});
document.getElementById('totalInput').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') { this.blur(); document.getElementById('confirmBtn').click(); }
});

document.getElementById('clearBtn').addEventListener('click', resetDeltas);

// --- Init ---
initRecipe();
render();
</script>
</body>
</html>
